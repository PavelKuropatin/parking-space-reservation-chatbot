name: Build (main)

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install project
        run: uv sync --locked

      - name: Verify package imports
        run: uv run python -c "import chatbot; print('chatbot package OK')"
